{% extends "base_app.html" %}

{% block title %}Jogos | Tehillim{% endblock %}

{% block head %}
  <link rel="stylesheet" href="/static/css/games.css">
  <style>
    .jogos-header {
      padding: 28px 32px 0;
    }
    .jogos-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1F2937;
      margin: 0 0 4px;
    }
    .jogos-header p {
      font-size: 0.85rem;
      color: #6B7280;
      margin: 0 0 20px;
    }
    .jogos-layout {
      display: flex;
      gap: 0;
      height: calc(100vh - 130px);
      overflow: hidden;
    }
    .jogos-nav {
      width: 220px;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 12px 16px;
      border-right: 1px solid #F3F4F6;
      background: #fff;
    }
    .jogos-stage {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      background: #FAF7F2;
    }
    @media (max-width: 768px) {
      .jogos-layout {
        flex-direction: column;
        height: auto;
      }
      .jogos-nav {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #F3F4F6;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        padding: 10px 16px;
        display: flex;
        gap: 8px;
        flex-wrap: nowrap;
      }
      .jogos-nav .nav-group { display: contents; }
      .jogos-nav .nav-category { display: none; }
      .jogos-nav .nav-item {
        display: inline-flex !important;
        flex: 0 0 auto;
      }
      .jogos-stage {
        padding: 16px;
      }
      .jogos-header {
        padding: 20px 16px 0;
      }
    }
  </style>
{% endblock %}

{% block header %}
<header class="jogos-header">
  <h1>Jogos Musicais</h1>
  <p id="lab-count">Carregando jogos…</p>
</header>
{% endblock %}

{% block content %}
<div class="jogos-layout">
  <nav class="jogos-nav lab-nav" id="lab-nav" aria-label="Lista de jogos"></nav>
  <section class="jogos-stage lab-stage" id="lab-stage">
    <div class="lab-empty">
      <span>▶</span>
      <p>Selecione um jogo ao lado para começar.</p>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
  <script src="https://cdn.jsdelivr.net/npm/vexflow@3.0.9/releases/vexflow-min.js"></script>
  <script src="/static/js/vexflow-utils.js"></script>
  <script src="/static/js/audio.js"></script>
  <script src="/static/js/games.js"></script>
{% endblock %}
