<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-MCSBVW3L');</script>
  <!-- End Google Tag Manager -->
  <title>{% block title %}Tehillim{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    .app-shell {
      min-height: 100dvh;
    }

    #mobile-profile-nav-btn { display: none; }

    @media (max-width: 768px) {
      #mobile-profile-nav-btn { display: flex; }

      .app-shell {
        height: 100dvh;
        min-height: 100dvh;
      }

      .app-sidebar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 50;
        width: 100% !important;
        height: 72px;
        flex-direction: row;
        border-top: 1px solid rgba(31, 41, 55, 0.08);
      }

      .sidebar-logo,
      .sidebar-profile {
        display: none !important;
      }

      .app-sidebar nav {
        min-height: 0;
        width: 100%;
        flex: 1 1 auto;
        flex-direction: row !important;
        gap: 4px !important;
        overflow-x: auto;
        padding: 8px 10px !important;
      }

      .app-sidebar nav a {
        flex: 1 0 70px;
        min-width: 70px;
        flex-direction: column;
        justify-content: center;
        gap: 3px !important;
        padding: 7px 5px !important;
        border-radius: 12px !important;
        font-size: 10px !important;
        line-height: 1.1;
        text-align: center;
      }

      .app-sidebar nav a img {
        width: 19px !important;
        height: 19px !important;
      }

      .app-main {
        width: 100%;
        min-width: 0;
        padding-bottom: 72px;
      }

      header {
        padding: 16px !important;
      }

      header > .relative {
        align-items: flex-start !important;
        gap: 12px !important;
        flex-wrap: wrap;
      }

      header h1 {
        font-size: 22px !important;
        line-height: 1.15 !important;
      }

      header > .absolute {
        display: none !important;
      }

      .app-content {
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>

  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <script>
    window.CURRENT_USER = {{ current_user | tojson }};
  </script>
  <script src="/static/js/auth.js?v=4"></script>

  <!-- ① Leitura SÍNCRONA do localStorage — roda antes do DOMContentLoaded
       Garante que window._progress já existe quando as páginas renderizam      -->
  <script>
    (function () {
      try {
        const total = {{ groups | sum(attribute='module_count') }};
        const prog  = [];
        let done    = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key?.startsWith('tehillim:') || !key.endsWith(':completed')) continue;
          const slug      = key.split(':')[1];
          const completed = Number(localStorage.getItem(key) || 0);
          prog.push({ module_slug: slug, completed });
          if (completed > 0) done++;
        }
        window._progress     = prog;
        window._doneModules  = done;
        window._totalModules = total;
        window._studyDays    = [];

        // Streak do cache diário
        const sc = JSON.parse(localStorage.getItem('tehillim:streak') || 'null');
        window._streak = (sc?.value ?? 0);
      } catch (e) {}
    })();
  </script>

  <!-- ② Atualização assíncrona após auth concluir (sidebar + nome + streak) -->
  <script>
    function _computeStreak(days) {
      if (!days.length) return 0;
      const dates = days.map(d => d.day).sort().reverse();
      const today = new Date().toISOString().slice(0, 10);
      let streak = 0, cur = today;
      for (const d of dates) {
        if (d === cur) { streak++; const dt = new Date(cur); dt.setDate(dt.getDate() - 1); cur = dt.toISOString().slice(0, 10); }
        else if (d < cur) break;
      }
      return streak;
    }

    (async () => {
      try {
        if (!window.CURRENT_USER) return;

        window._userId   = window.CURRENT_USER.id;
        window._userName = window.CURRENT_USER.name || window.CURRENT_USER.email?.split('@')[0] || 'Aluno';

        document.querySelectorAll('[data-user-name]').forEach(el => el.textContent = window._userName);

        // Popula perfil na sidebar e popup
        const _email = window.CURRENT_USER.email || '';
        const _role  = window.CURRENT_USER.is_teacher ? 'Professor' : 'Aluno';
        ['sidebar-user-name','popup-user-name'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = window._userName; });
        const roleEl  = document.getElementById('sidebar-user-role'); if (roleEl)  roleEl.textContent  = _role;
        const emailEl = document.getElementById('popup-user-email');  if (emailEl) emailEl.textContent = _email;

        // Mostra itens de navegação exclusivos do professor
        if (window.CURRENT_USER.is_teacher) {
          document.querySelectorAll('.teacher-nav').forEach(el => el.classList.remove('hidden'));
          // Badge de mensagens não lidas de alunos
          function refreshTeacherMsgBadge() {
            fetch('/api/teacher/messages/unread')
              .then(r => r.ok ? r.json() : { total: 0 })
              .then(({ total }) => {
                const badge = document.getElementById('teacher-msg-badge');
                if (!badge) return;
                if (total > 0) { badge.style.display = ''; badge.textContent = total; }
                else           { badge.style.display = 'none'; }
                window._teacherUnreadByStudent = {};
              }).catch(() => {});
          }
          refreshTeacherMsgBadge();
          setInterval(refreshTeacherMsgBadge, 60000);
        } else {
          // Mostra link de mensagens e carrega badge de não lidas
          document.querySelectorAll('.student-only').forEach(el => el.classList.remove('hidden'));
          fetch('/api/messages/unread-count')
            .then(r => r.ok ? r.json() : { count: 0 })
            .then(({ count }) => {
              if (count > 0) {
                const badge = document.getElementById('msg-nav-badge');
                if (badge) { badge.style.display = ''; badge.textContent = count; }
              }
            }).catch(() => {});
        }

        // Streak — cache diário
        const today = new Date().toISOString().slice(0, 10);
        let sc = null;
        try { sc = JSON.parse(localStorage.getItem('tehillim:streak') || 'null'); } catch {}

        if (sc?.date === today) {
          window._streak = sc.value;
          document.querySelectorAll('[data-streak]').forEach(el => el.textContent = sc.value);
          return;
        }

        // Cache expirado → busca via Flask API em background
        fetch('/api/study-days')
          .then(r => r.ok ? r.json() : { days: [] })
          .then(({ days }) => {
            window._studyDays = days || [];
            window._streak    = _computeStreak(days || []);
            document.querySelectorAll('[data-streak]').forEach(el => el.textContent = window._streak);
            localStorage.setItem('tehillim:streak', JSON.stringify({ date: today, value: window._streak }));
          }).catch(() => {});

      } catch (e) { console.warn('sidebar init', e); }
    })();
  </script>

  <!-- Popup do perfil (desktop) -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const btn   = document.getElementById('user-profile-btn');
      const popup = document.getElementById('user-popup');
      if (!btn || !popup) return;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        popup.classList.toggle('hidden');
      });
      document.addEventListener('click', function (e) {
        if (!popup.contains(e.target)) popup.classList.add('hidden');
      });
    });
  </script>

    <div style="padding:0 20px 4px">
      <div style="background:#FAF7F2;border-radius:14px;padding:14px 16px;margin-bottom:8px">

        <p style="font-size:11px;color:#9ca3af;margin:4px 0 0" id="mobile-popup-email">—</p>

  <script>
    function openMobileProfile() {
      const sheet   = document.getElementById('mobile-profile-sheet');
      const overlay = document.getElementById('mobile-profile-overlay');
      // Popula nome/email
      const nameEl  = document.getElementById('mobile-popup-name');
      const emailEl = document.getElementById('mobile-popup-email');
      if (nameEl)  nameEl.textContent  = document.getElementById('popup-user-name')?.textContent  || window._userName || '—';
      if (emailEl) emailEl.textContent = document.getElementById('popup-user-email')?.textContent || '—';
      overlay.style.display = 'block';
      sheet.style.transform = 'translateY(0)';
    }
    function closeMobileProfile() {
      document.getElementById('mobile-profile-sheet').style.transform = 'translateY(100%)';
      document.getElementById('mobile-profile-overlay').style.display = 'none';
    }
  </script>
