<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tehillim{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-[#FAF7F2] h-screen flex overflow-hidden text-gray-800" style="visibility:hidden">

  <!-- ══════════════ SIDEBAR ══════════════ -->
  <aside class="w-[210px] bg-white flex flex-col shadow-sm flex-shrink-0">

    <!-- Logo -->
    <div class="flex flex-col items-center pt-7 pb-5 px-4 flex-shrink-0">
      <a href="/index.html" class="w-[58px] h-[58px] rounded-full border-[2.5px] border-gray-800 flex items-center justify-center">
        <img src="{{ url_for('static', filename='icons/tehillim-logo.svg') }}" alt="Tehillim" class="w-9 h-9 object-contain"/>
      </a>
      <p class="font-bold text-[11px] tracking-[3px] mt-2 text-gray-800">TEHILLIM</p>
      <p class="text-[9px] tracking-[2.5px] text-gray-400 uppercase">Orquestra</p>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col px-3 gap-0.5 flex-1 overflow-y-auto min-h-0">

      <a href="/index.html" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13px] transition-colors
        {% if active_page == 'inicio' %}bg-[#F2EAD8] text-[#7A5C2E] font-semibold{% else %}text-gray-500 hover:bg-gray-50{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-inicio.svg') }}" class="w-[18px] h-[18px] flex-shrink-0 {% if active_page != 'inicio' %}opacity-40{% endif %}"/>
        Início
      </a>

      <a href="/grupos" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13px] transition-colors
        {% if active_page == 'grupos' %}bg-[#F2EAD8] text-[#7A5C2E] font-semibold{% else %}text-gray-500 hover:bg-gray-50{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-grupos.svg') }}" class="w-[18px] h-[18px] flex-shrink-0 {% if active_page != 'grupos' %}opacity-40{% endif %}"/>
        Grupos
      </a>

      <a href="/trilhas" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13px] transition-colors
        {% if active_page == 'trilhas' %}bg-[#F2EAD8] text-[#7A5C2E] font-semibold{% else %}text-gray-500 hover:bg-gray-50{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-trilhas.svg') }}" class="w-[18px] h-[18px] flex-shrink-0 {% if active_page != 'trilhas' %}opacity-40{% endif %}"/>
        Minhas Trilhas
      </a>

      <a href="/aulas" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13px] transition-colors
        {% if active_page == 'aulas' %}bg-[#F2EAD8] text-[#7A5C2E] font-semibold{% else %}text-gray-500 hover:bg-gray-50{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-aulas.svg') }}" class="w-[18px] h-[18px] flex-shrink-0 {% if active_page != 'aulas' %}opacity-40{% endif %}"/>
        Aulas complementares
      </a>

      <a href="/desempenho" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13px] transition-colors
        {% if active_page == 'desempenho' %}bg-[#F2EAD8] text-[#7A5C2E] font-semibold{% else %}text-gray-500 hover:bg-gray-50{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-desempenho.svg') }}" class="w-[18px] h-[18px] flex-shrink-0 {% if active_page != 'desempenho' %}opacity-40{% endif %}"/>
        Desempenho
      </a>

      <a href="/conquistas" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13px] transition-colors
        {% if active_page == 'conquistas' %}bg-[#F2EAD8] text-[#7A5C2E] font-semibold{% else %}text-gray-500 hover:bg-gray-50{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-conquistas.svg') }}" class="w-[18px] h-[18px] flex-shrink-0 {% if active_page != 'conquistas' %}opacity-40{% endif %}"/>
        Conquistas
      </a>
    </nav>

    <!-- Perfil do usuário + popup -->
    <div class="mx-3 mb-4 mt-3 relative flex-shrink-0" id="user-profile-wrap">
      <button id="user-profile-btn"
        class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl hover:bg-gray-50 transition-colors text-left">
        <div class="w-9 h-9 rounded-full flex-shrink-0 overflow-hidden border-2 border-gray-200">
          <svg viewBox="0 0 36 36" class="w-full h-full" fill="none">
            <rect width="36" height="36" fill="#D4A574"/>
            <circle cx="18" cy="14" r="7" fill="#C49060"/>
            <ellipse cx="18" cy="32" rx="11" ry="8" fill="#C49060"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[13px] font-semibold text-gray-800 truncate" id="sidebar-user-name">—</p>
          <p class="text-[10px] text-gray-400 truncate" id="sidebar-user-role">Aluno</p>
        </div>
        <svg class="w-3.5 h-3.5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"/>
        </svg>
      </button>

      <!-- Popup sobe acima do botão -->
      <div id="user-popup"
        class="hidden absolute bottom-full left-0 right-0 mb-1 bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden z-50">
        <div class="px-4 py-3 bg-[#FAF7F2]">
          <p class="font-semibold text-[13px] text-gray-800" id="popup-user-name">—</p>
          <p class="text-[11px] text-gray-400 mt-0.5" id="popup-user-email">—</p>
        </div>
        <div class="p-1.5">
          <a href="/configuracoes"
            class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-[13px] text-gray-600 hover:bg-gray-50 transition-colors">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Configurações
          </a>
          <div class="h-px bg-gray-100 my-1"></div>
          <button onclick="window.auth.signOut()"
            class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-[13px] text-red-500 hover:bg-red-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
            </svg>
            Sair da conta
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══════════════ MAIN AREA ══════════════ -->
  <div class="flex-1 flex flex-col overflow-hidden">

    {% block header %}{% endblock %}

    <div class="flex-1 overflow-y-auto">
      {% block content %}{% endblock %}
    </div>
  </div>

  <!-- Supabase config -->
  <script>
    window.SUPABASE_URL      = "{{ supabase_url }}";
    window.SUPABASE_ANON_KEY = "{{ supabase_anon_key }}";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/static/js/auth.js"></script>
  <script>
    window.auth.ready.then(() => {
      if (!window.auth.isLoggedIn()) {
        const next = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.replace(`/login?next=${next}`);
        return;
      }
      document.body.style.visibility = 'visible';
    });
  </script>

  <!-- ① Leitura SÍNCRONA do localStorage — roda antes do DOMContentLoaded
       Garante que window._progress já existe quando as páginas renderizam      -->
  <script>
    (function () {
      try {
        const total = {{ groups | sum(attribute='module_count') }};
        const prog  = [];
        let done    = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key?.startsWith('tehillim:') || !key.endsWith(':completed')) continue;
          const slug      = key.split(':')[1];
          const completed = Number(localStorage.getItem(key) || 0);
          prog.push({ module_slug: slug, completed });
          if (completed > 0) done++;
        }
        window._progress     = prog;
        window._doneModules  = done;
        window._totalModules = total;
        window._studyDays    = [];

        // Streak do cache diário
        const sc = JSON.parse(localStorage.getItem('tehillim:streak') || 'null');
        window._streak = (sc?.value ?? 0);
      } catch (e) {}
    })();
  </script>

  <!-- ② Atualização assíncrona após auth concluir (sidebar + nome + streak) -->
  <script>
    function _computeStreak(days) {
      if (!days.length) return 0;
      const dates = days.map(d => d.day).sort().reverse();
      const today = new Date().toISOString().slice(0, 10);
      let streak = 0, cur = today;
      for (const d of dates) {
        if (d === cur) { streak++; const dt = new Date(cur); dt.setDate(dt.getDate() - 1); cur = dt.toISOString().slice(0, 10); }
        else if (d < cur) break;
      }
      return streak;
    }

    (async () => {
      try {
        await window.auth.ready;
        if (!window.auth.isLoggedIn()) return;

        const session    = window.auth.session;
        window._sb       = window.auth.client;
        window._userId   = session.user.id;
        window._userName = window.auth.getName();

        document.querySelectorAll('[data-user-name]').forEach(el => el.textContent = window._userName);

        // Popula perfil na sidebar e popup
        const _user  = window.auth.getUser();
        const _email = _user?.email || '';
        const _role  = (_user?.user_metadata?.role === 'teacher') ? 'Professor' : 'Aluno';
        ['sidebar-user-name','popup-user-name'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = window._userName; });
        const roleEl  = document.getElementById('sidebar-user-role'); if (roleEl)  roleEl.textContent  = _role;
        const emailEl = document.getElementById('popup-user-email');  if (emailEl) emailEl.textContent = _email;

        // Re-lê localStorage após auth.js possivelmente sincronizar dados novos
        const total = {{ groups | sum(attribute='module_count') }};
        const prog  = [];
        let done    = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key?.startsWith('tehillim:') || !key.endsWith(':completed')) continue;
          const slug      = key.split(':')[1];
          const completed = Number(localStorage.getItem(key) || 0);
          prog.push({ module_slug: slug, completed });
          if (completed > 0) done++;
        }
        window._progress     = prog;
        window._totalModules = total;
        window._doneModules  = done;

        // Streak — cache diário (só faz fetch quando o dia muda)
        const today = new Date().toISOString().slice(0, 10);
        let sc = null;
        try { sc = JSON.parse(localStorage.getItem('tehillim:streak') || 'null'); } catch {}

        if (sc?.date === today) {
          window._streak = sc.value;
          document.querySelectorAll('[data-streak]').forEach(el => el.textContent = sc.value);
          return;
        }

        // Cache expirado → busca em background, sem bloquear
        if (!window.auth.client) return;
        window.auth.client
          .from('study_days').select('day')
          .eq('user_id', session.user.id).order('day', { ascending: false })
          .then(({ data: days }) => {
            window._studyDays = days || [];
            window._streak    = _computeStreak(days || []);
            document.querySelectorAll('[data-streak]').forEach(el => el.textContent = window._streak);
            localStorage.setItem('tehillim:streak', JSON.stringify({ date: today, value: window._streak }));
          }).catch(() => {});

      } catch (e) { console.warn('sidebar init', e); }
    })();
  </script>

  <!-- Popup do perfil -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const btn   = document.getElementById('user-profile-btn');
      const popup = document.getElementById('user-popup');
      if (!btn || !popup) return;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        popup.classList.toggle('hidden');
      });
      document.addEventListener('click', function (e) {
        if (!popup.contains(e.target)) popup.classList.add('hidden');
      });
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
