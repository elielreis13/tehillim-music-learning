<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Monitor screen -->
  <rect x="4" y="6" width="40" height="28" rx="3" stroke="#7A5C2E" stroke-width="2.5"/>
  <!-- Stand neck -->
  <line x1="24" y1="34" x2="24" y2="42" stroke="#7A5C2E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stand base -->
  <line x1="16" y1="42" x2="32" y2="42" stroke="#7A5C2E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bar chart inside screen -->
  <rect x="10" y="24" width="6" height="8"  rx="1" fill="#7A5C2E" opacity="0.25" stroke="#7A5C2E" stroke-width="1.5"/>
  <rect x="21" y="18" width="6" height="14" rx="1" fill="#7A5C2E" opacity="0.45" stroke="#7A5C2E" stroke-width="1.5"/>
  <rect x="32" y="12" width="6" height="20" rx="1" fill="#7A5C2E" opacity="0.70" stroke="#7A5C2E" stroke-width="1.5"/>
</svg>
