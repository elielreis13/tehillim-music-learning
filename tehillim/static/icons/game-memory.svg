<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Card 1: face down (cross-hatch pattern) -->
  <rect x="4" y="10" width="18" height="28" rx="3" stroke="#7A5C2E" stroke-width="2"/>
  <line x1="8"  y1="14" x2="18" y2="34" stroke="#7A5C2E" stroke-width="1" opacity="0.3"/>
  <line x1="18" y1="14" x2="8"  y2="34" stroke="#7A5C2E" stroke-width="1" opacity="0.3"/>
  <!-- Card 2: face up (music note revealed) -->
  <rect x="26" y="10" width="18" height="28" rx="3" stroke="#7A5C2E" stroke-width="2"/>
  <ellipse cx="32" cy="31" rx="4.5" ry="3" transform="rotate(-15 32 31)" fill="#7A5C2E"/>
  <line x1="36" y1="28.5" x2="36" y2="18" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round"/>
  <path d="M36 18C39.5 19.5 40 23 37.5 25" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flip arrow hint above cards -->
  <path d="M9 7C12 3 20 5 22 9" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M22 9L24 5.5M22 9L18.5 7.5" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
</svg>
