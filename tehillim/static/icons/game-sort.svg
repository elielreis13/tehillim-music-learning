<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Three sortable bars -->
  <rect x="6" y="8"  width="26" height="8" rx="2" stroke="#7A5C2E" stroke-width="2"/>
  <rect x="6" y="20" width="26" height="8" rx="2" stroke="#7A5C2E" stroke-width="2"/>
  <rect x="6" y="32" width="26" height="8" rx="2" stroke="#7A5C2E" stroke-width="2"/>
  <!-- Sort up arrow -->
  <path d="M36 12L40 7L44 12" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sort down arrow -->
  <path d="M36 36L40 41L44 36" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Vertical connector -->
  <line x1="40" y1="7" x2="40" y2="41" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round"/>
</svg>
