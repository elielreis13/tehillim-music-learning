<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Three slider tracks -->
  <line x1="6" y1="14" x2="42" y2="14" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="24" x2="42" y2="24" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="34" x2="42" y2="34" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Slider thumbs (white fill so they "cut" the track) -->
  <circle cx="18" cy="14" r="5" fill="white" stroke="#1f2937" stroke-width="2.5"/>
  <circle cx="30" cy="24" r="5" fill="white" stroke="#1f2937" stroke-width="2.5"/>
  <circle cx="16" cy="34" r="5" fill="white" stroke="#1f2937" stroke-width="2.5"/>
</svg>
