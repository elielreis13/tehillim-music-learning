<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Staircase representing intervals ascending -->
  <polyline points="6,42 6,34 14,34 14,26 22,26 22,18 30,18 30,10 42,10"
            stroke="#7A5C2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bracket lines at each step (interval marks) -->
  <line x1="6" y1="42" x2="14" y2="42" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round"/>
  <!-- Small dots at interval points -->
  <circle cx="14" cy="34" r="1.8" fill="#7A5C2E"/>
  <circle cx="22" cy="26" r="1.8" fill="#7A5C2E"/>
  <circle cx="30" cy="18" r="1.8" fill="#7A5C2E"/>
  <circle cx="42" cy="10" r="1.8" fill="#7A5C2E"/>
</svg>
