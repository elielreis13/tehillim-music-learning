<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Laptop screen -->
  <rect x="2" y="10" width="28" height="20" rx="2" stroke="#7A5C2E" stroke-width="2"/>
  <!-- Screen inner area -->
  <rect x="5" y="13" width="22" height="14" rx="1" stroke="#7A5C2E" stroke-width="1" opacity="0.4"/>
  <!-- Small bar chart inside screen -->
  <rect x="9"  y="21" width="3" height="6" rx="0.5" fill="#7A5C2E" opacity="0.5"/>
  <rect x="14" y="18" width="3" height="9" rx="0.5" fill="#7A5C2E" opacity="0.5"/>
  <rect x="19" y="16" width="3" height="11" rx="0.5" fill="#7A5C2E" opacity="0.5"/>
  <!-- Laptop keyboard base -->
  <rect x="2" y="30" width="28" height="4" rx="1" stroke="#7A5C2E" stroke-width="2"/>
  <!-- Touchpad -->
  <rect x="10" y="31.5" width="12" height="1.5" rx="0.5" stroke="#7A5C2E" stroke-width="1" opacity="0.5"/>
  <!-- Phone body -->
  <rect x="34" y="14" width="12" height="22" rx="3" stroke="#7A5C2E" stroke-width="2"/>
  <!-- Phone screen -->
  <rect x="36" y="17" width="8" height="13" rx="1" stroke="#7A5C2E" stroke-width="1" opacity="0.4"/>
  <!-- Phone home button -->
  <circle cx="40" cy="32.5" r="1.5" stroke="#7A5C2E" stroke-width="1.5"/>
</svg>
