<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Three vertical note stems representing a chord -->
  <line x1="14" y1="10" x2="14" y2="34" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="6" x2="24" y2="34" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="10" x2="34" y2="34" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round"/>
  <!-- Note heads -->
  <ellipse cx="12.5" cy="36" rx="3.5" ry="2.5" transform="rotate(-15 12.5 36)" stroke="#7A5C2E" stroke-width="1.5"/>
  <ellipse cx="22.5" cy="36" rx="3.5" ry="2.5" transform="rotate(-15 22.5 36)" stroke="#7A5C2E" stroke-width="1.5"/>
  <ellipse cx="32.5" cy="36" rx="3.5" ry="2.5" transform="rotate(-15 32.5 36)" stroke="#7A5C2E" stroke-width="1.5"/>
  <!-- Horizontal bracket at top connecting the chord -->
  <path d="M14 10 Q24 6 34 10" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>
