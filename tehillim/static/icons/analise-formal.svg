<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Three form blocks: A - B - A -->
  <rect x="4" y="14" width="12" height="20" rx="2" stroke="#7A5C2E" stroke-width="2"/>
  <rect x="18" y="8" width="12" height="32" rx="2" stroke="#7A5C2E" stroke-width="2"/>
  <rect x="32" y="14" width="12" height="20" rx="2" stroke="#7A5C2E" stroke-width="2"/>
  <!-- Baseline -->
  <line x1="4" y1="42" x2="44" y2="42" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small equal-sign marks showing A=A symmetry -->
  <line x1="8" y1="38" x2="14" y2="38" stroke="#7A5C2E" stroke-width="1" stroke-linecap="round"/>
  <line x1="34" y1="38" x2="40" y2="38" stroke="#7A5C2E" stroke-width="1" stroke-linecap="round"/>
</svg>
