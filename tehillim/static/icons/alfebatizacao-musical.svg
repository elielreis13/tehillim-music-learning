<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Five staff lines -->
  <line x1="4" y1="13" x2="44" y2="13" stroke="#7A5C2E" stroke-width="1.5"/>
  <line x1="4" y1="18" x2="44" y2="18" stroke="#7A5C2E" stroke-width="1.5"/>
  <line x1="4" y1="23" x2="44" y2="23" stroke="#7A5C2E" stroke-width="1.5"/>
  <line x1="4" y1="28" x2="44" y2="28" stroke="#7A5C2E" stroke-width="1.5"/>
  <line x1="4" y1="33" x2="44" y2="33" stroke="#7A5C2E" stroke-width="1.5"/>
  <!-- Opening double barline -->
  <line x1="4" y1="11" x2="4" y2="35" stroke="#7A5C2E" stroke-width="2.5"/>
  <line x1="7" y1="11" x2="7" y2="35" stroke="#7A5C2E" stroke-width="1"/>
  <!-- Note 1: low -->
  <ellipse cx="16" cy="30.5" rx="4.5" ry="3" transform="rotate(-15 16 30.5)" fill="#7A5C2E"/>
  <line x1="20" y1="28" x2="20" y2="17" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Note 2: mid -->
  <ellipse cx="28" cy="25.5" rx="4.5" ry="3" transform="rotate(-15 28 25.5)" fill="#7A5C2E"/>
  <line x1="32" y1="23" x2="32" y2="12" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Note 3: high -->
  <ellipse cx="40" cy="20.5" rx="4.5" ry="3" transform="rotate(-15 40 20.5)" fill="#7A5C2E"/>
  <line x1="44" y1="18" x2="44" y2="7" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
</svg>
