<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Metronome body (trapezoid: wide at bottom, narrow at top) -->
  <path d="M15 42H33L39 10H9L15 42Z" stroke="#7A5C2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pendulum arm (angled right) -->
  <line x1="24" y1="10" x2="34" y2="33" stroke="#7A5C2E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pendulum bob -->
  <rect x="30.5" y="29" width="7" height="5" rx="1.5" fill="#7A5C2E" transform="rotate(-15 34 31.5)"/>
  <!-- Tick marks on body -->
  <line x1="16" y1="22" x2="21" y2="22" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="30" x2="20" y2="30" stroke="#7A5C2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small circle at pivot point -->
  <circle cx="24" cy="10" r="2.5" fill="#7A5C2E"/>
</svg>
