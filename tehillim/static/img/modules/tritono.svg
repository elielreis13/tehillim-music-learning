<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="240" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">TRÍTONO — O DIABO NA MÚSICA</text>

  <!-- Panel 1: Piano showing tritone -->
  <rect x="25" y="42" width="220" height="165" rx="10" fill="#FFEBEE"/>
  <text x="135" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828">6 semitons = Trítono</text>

  <!-- Mini piano keyboard -->
  <g fill="white" stroke="#BBB" stroke-width="1">
    <rect x="40"  y="68" width="28" height="70" rx="2"/><!-- C -->
    <rect x="70"  y="68" width="28" height="70" rx="2"/><!-- D -->
    <rect x="100" y="68" width="28" height="70" rx="2"/><!-- E -->
    <rect x="130" y="68" width="28" height="70" rx="2"/><!-- F -->
    <rect x="160" y="68" width="28" height="70" rx="2"/><!-- F# white -->
    <rect x="190" y="68" width="28" height="70" rx="2"/><!-- G -->
    <rect x="220" y="68" width="28" height="70" rx="2"/><!-- A -->
  </g>
  <!-- F# black key -->
  <rect x="153" y="68" width="20" height="44" rx="2" fill="#C62828"/>
  <!-- Highlight C and F# -->
  <rect x="40" y="68" width="28" height="70" rx="2" fill="#FFCDD2" stroke="#C62828" stroke-width="2"/>
  <text x="54"  y="148" font-size="10" text-anchor="middle" fill="#C62828" font-weight="700">C</text>
  <text x="163" y="60" font-size="10" text-anchor="middle" fill="white" font-weight="700">F#</text>

  <!-- Brace showing 6 semitones -->
  <path d="M 54 155 Q 108 170 163 155" fill="none" stroke="#C62828" stroke-width="2"/>
  <text x="108" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828">6 semitons</text>
  <text x="108" y="195" text-anchor="middle" font-size="10" fill="#C62828">4ª aum / 5ª dim</text>

  <!-- Panel 2: Sol7 chord with internal tritone -->
  <rect x="265" y="42" width="245" height="165" rx="10" fill="#FFF8E1"/>
  <text x="387" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#F57F17">Trítono no acorde G7</text>

  <!-- Staff with G7 chord -->
  <g stroke="#CCC" stroke-width="1">
    <line x1="290" y1="90"  x2="490" y2="90"/>
    <line x1="290" y1="104" x2="490" y2="104"/>
    <line x1="290" y1="118" x2="490" y2="118"/>
    <line x1="290" y1="132" x2="490" y2="132"/>
    <line x1="290" y1="146" x2="490" y2="146"/>
  </g>
  <!-- G7 notes stacked: Sol, Si, Re, Fa -->
  <ellipse cx="380" cy="146" rx="11" ry="7" fill="#555"/>
  <ellipse cx="380" cy="132" rx="11" ry="7" fill="#C62828"/>
  <ellipse cx="380" cy="118" rx="11" ry="7" fill="#555"/>
  <ellipse cx="380" cy="104" rx="11" ry="7" fill="#C62828"/>
  <!-- Circle the tritone (Si and Fa) -->
  <ellipse cx="380" cy="118" rx="22" ry="14" fill="none" stroke="#F44336" stroke-width="2.5" stroke-dasharray="5,3"/>

  <text x="310" y="154" font-size="10" fill="#888">Sol</text>
  <text x="310" y="140" font-size="10" fill="#C62828" font-weight="700">Si ←</text>
  <text x="310" y="126" font-size="10" fill="#555">Ré</text>
  <text x="310" y="112" font-size="10" fill="#C62828" font-weight="700">Fá ←</text>

  <text x="430" y="125" font-size="10" fill="#F44336" font-weight="700">Trítono</text>
  <text x="430" y="138" font-size="9" fill="#F44336">Si↔Fá</text>
  <text x="387" y="192" text-anchor="middle" font-size="10" fill="#555">G7 = 5 notas de tensão</text>

  <!-- Panel 3: Resolution -->
  <rect x="530" y="42" width="240" height="165" rx="10" fill="#E8F5E9"/>
  <text x="650" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">Resolução G7 → C</text>

  <g stroke="#CCC" stroke-width="1">
    <line x1="550" y1="90"  x2="760" y2="90"/>
    <line x1="550" y1="104" x2="760" y2="104"/>
    <line x1="550" y1="118" x2="760" y2="118"/>
    <line x1="550" y1="132" x2="760" y2="132"/>
    <line x1="550" y1="146" x2="760" y2="146"/>
  </g>
  <!-- G7 chord (left) -->
  <ellipse cx="600" cy="146" rx="10" ry="6" fill="#C62828"/>
  <ellipse cx="600" cy="132" rx="10" ry="6" fill="#C62828"/>
  <!-- C chord (right) -->
  <ellipse cx="720" cy="146" rx="10" ry="6" fill="#2E7D32"/>
  <ellipse cx="720" cy="118" rx="10" ry="6" fill="#2E7D32"/>
  <ellipse cx="720" cy="104" rx="10" ry="6" fill="#2E7D32"/>

  <!-- Resolution arrows -->
  <path d="M 612 128 Q 660 105 708 108" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="708,108 700,104 700,113" fill="#2E7D32"/>
  <text x="655" y="100" font-size="9" fill="#2E7D32">Si → Dó (½ tom)</text>

  <path d="M 612 138 Q 660 155 708 150" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="708,150 700,145 700,155" fill="#2E7D32"/>
  <text x="655" y="168" font-size="9" fill="#2E7D32">Fá → Mi (½ tom)</text>

  <text x="650" y="195" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="700">Alívio da tensão = V→I</text>
</svg>
