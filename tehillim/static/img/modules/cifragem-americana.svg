<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="280" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">CIFRAGEM AMERICANA — LENDO SÍMBOLOS DE ACORDE</text>

  <!-- Chord symbols grid -->
  <!-- 3 rows x 5 columns -->

  <!-- Row 1: Basic chords -->
  <!-- C -->
  <rect x="30"  y="45" width="130" height="70" rx="8" fill="#E3F2FD"/>
  <text x="95"  y="78" text-anchor="middle" font-size="36" font-weight="700" fill="#1565C0">C</text>
  <text x="95"  y="105" text-anchor="middle" font-size="11" fill="#555">Dó Maior</text>

  <!-- Cm -->
  <rect x="170" y="45" width="130" height="70" rx="8" fill="#E8F5E9"/>
  <text x="235" y="78" text-anchor="middle" font-size="36" font-weight="700" fill="#2E7D32">Cm</text>
  <text x="235" y="105" text-anchor="middle" font-size="11" fill="#555">Dó menor</text>

  <!-- C7 -->
  <rect x="310" y="45" width="130" height="70" rx="8" fill="#FFEBEE"/>
  <text x="375" y="78" text-anchor="middle" font-size="36" font-weight="700" fill="#C62828">C7</text>
  <text x="375" y="105" text-anchor="middle" font-size="11" fill="#555">Dom. sétima</text>

  <!-- Cmaj7 -->
  <rect x="450" y="45" width="150" height="70" rx="8" fill="#E3F2FD"/>
  <text x="525" y="78" text-anchor="middle" font-size="26" font-weight="700" fill="#1565C0">Cmaj7</text>
  <text x="525" y="105" text-anchor="middle" font-size="11" fill="#555">Maior com 7ª maior</text>

  <!-- Cm7 -->
  <rect x="610" y="45" width="150" height="70" rx="8" fill="#E8F5E9"/>
  <text x="685" y="78" text-anchor="middle" font-size="28" font-weight="700" fill="#2E7D32">Cm7</text>
  <text x="685" y="105" text-anchor="middle" font-size="11" fill="#555">Menor com 7ª menor</text>

  <!-- Row 2: More complex -->
  <!-- Csus2 -->
  <rect x="30"  y="125" width="130" height="70" rx="8" fill="#FFF8E1"/>
  <text x="95"  y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#F57F17">Csus2</text>
  <text x="95"  y="185" text-anchor="middle" font-size="10" fill="#555">Dó-Ré-Sol (sem 3ª)</text>

  <!-- Csus4 -->
  <rect x="170" y="125" width="130" height="70" rx="8" fill="#FFF8E1"/>
  <text x="235" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#F57F17">Csus4</text>
  <text x="235" y="185" text-anchor="middle" font-size="10" fill="#555">Dó-Fá-Sol (sem 3ª)</text>

  <!-- Cadd9 -->
  <rect x="310" y="125" width="130" height="70" rx="8" fill="#EDE7F6"/>
  <text x="375" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#4527A0">Cadd9</text>
  <text x="375" y="185" text-anchor="middle" font-size="10" fill="#555">Dó-Mi-Sol-Ré (9ª)</text>

  <!-- C/E (slash chord) -->
  <rect x="450" y="125" width="150" height="70" rx="8" fill="#FCE4EC"/>
  <text x="525" y="155" text-anchor="middle" font-size="26" font-weight="700" fill="#C62828">C/E</text>
  <text x="525" y="185" text-anchor="middle" font-size="10" fill="#555">Dó com Mi no baixo</text>

  <!-- Cdim -->
  <rect x="610" y="125" width="150" height="70" rx="8" fill="#EFEBE9"/>
  <text x="685" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#4E342E">Cdim / C°</text>
  <text x="685" y="185" text-anchor="middle" font-size="10" fill="#555">Dó diminuto</text>

  <!-- Legend / key -->
  <rect x="30" y="210" width="740" height="50" rx="8" fill="#F5F5F5"/>
  <text x="400" y="228" text-anchor="middle" font-size="11.5" font-weight="700" fill="#333">Chaves para ler qualquer cifra:</text>
  <text x="400" y="248" text-anchor="middle" font-size="11" fill="#666">Letra sozinha = Maior  ·  m = menor  ·  7 = 7ª dom  ·  maj7 = 7ª maior  ·  sus = suspensão  ·  / = baixo específico</text>
</svg>
