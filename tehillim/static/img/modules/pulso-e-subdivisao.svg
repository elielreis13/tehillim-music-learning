<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="240" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">PULSO E SUBDIVISÃO RÍTMICA</text>

  <!-- PULSO row -->
  <text x="60" y="76" text-anchor="end" font-size="12" font-weight="700" fill="#1565C0">PULSO</text>
  <!-- 4 beats -->
  <rect x="80"  y="56" width="145" height="36" rx="8" fill="#1565C0"/>
  <rect x="240" y="56" width="145" height="36" rx="8" fill="#1565C0"/>
  <rect x="400" y="56" width="145" height="36" rx="8" fill="#1565C0"/>
  <rect x="560" y="56" width="145" height="36" rx="8" fill="#1565C0"/>
  <g font-size="20" font-weight="700" fill="white" text-anchor="middle">
    <text x="152" y="81">1</text>
    <text x="312" y="81">2</text>
    <text x="472" y="81">3</text>
    <text x="632" y="81">4</text>
  </g>

  <!-- SUBDIVISÃO BINÁRIA row -->
  <text x="60" y="136" text-anchor="end" font-size="11" font-weight="700" fill="#4CAF50">SUB÷2</text>
  <!-- 8 eighth notes -->
  <g fill="#4CAF50">
    <rect x="80"  y="110" width="68" height="30" rx="5"/>
    <rect x="157" y="110" width="68" height="30" rx="5"/>
    <rect x="240" y="110" width="68" height="30" rx="5"/>
    <rect x="317" y="110" width="68" height="30" rx="5"/>
    <rect x="400" y="110" width="68" height="30" rx="5"/>
    <rect x="477" y="110" width="68" height="30" rx="5"/>
    <rect x="560" y="110" width="68" height="30" rx="5"/>
    <rect x="637" y="110" width="68" height="30" rx="5"/>
  </g>
  <g font-size="13" fill="white" text-anchor="middle">
    <text x="114" y="130">1</text>
    <text x="191" y="130">e</text>
    <text x="274" y="130">2</text>
    <text x="351" y="130">e</text>
    <text x="434" y="130">3</text>
    <text x="511" y="130">e</text>
    <text x="594" y="130">4</text>
    <text x="671" y="130">e</text>
  </g>

  <!-- SUBDIVISÃO TERNÁRIA row -->
  <text x="60" y="196" text-anchor="end" font-size="11" font-weight="700" fill="#FF9800">SUB÷3</text>
  <!-- 12 triplet subdivisions (3 per beat) -->
  <g fill="#FF9800">
    <rect x="80"  y="168" width="43" height="28" rx="4"/>
    <rect x="128" y="168" width="43" height="28" rx="4"/>
    <rect x="176" y="168" width="43" height="28" rx="4"/>
    <rect x="240" y="168" width="43" height="28" rx="4"/>
    <rect x="288" y="168" width="43" height="28" rx="4"/>
    <rect x="336" y="168" width="43" height="28" rx="4"/>
    <rect x="400" y="168" width="43" height="28" rx="4"/>
    <rect x="448" y="168" width="43" height="28" rx="4"/>
    <rect x="496" y="168" width="43" height="28" rx="4"/>
    <rect x="560" y="168" width="43" height="28" rx="4"/>
    <rect x="608" y="168" width="43" height="28" rx="4"/>
    <rect x="656" y="168" width="43" height="28" rx="4"/>
  </g>
  <g font-size="10" fill="white" text-anchor="middle">
    <text x="101" y="186">ta</text>
    <text x="149" y="186">ki</text>
    <text x="197" y="186">da</text>
    <text x="261" y="186">ta</text>
    <text x="309" y="186">ki</text>
    <text x="357" y="186">da</text>
    <text x="421" y="186">ta</text>
    <text x="469" y="186">ki</text>
    <text x="517" y="186">da</text>
    <text x="581" y="186">ta</text>
    <text x="629" y="186">ki</text>
    <text x="677" y="186">da</text>
  </g>

  <!-- Footer -->
  <text x="400" y="220" text-anchor="middle" font-size="11" fill="#888">Pulso = a batida constante  ·  Subdivisão binária = colcheias (1-e-2-e)  ·  Subdivisão ternária = tercinas (ta-ki-da)</text>
</svg>
