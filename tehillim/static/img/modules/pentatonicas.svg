<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="280" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">ESCALAS PENTATÔNICAS — MAIOR E MENOR</text>

  <!-- Piano keyboard with pentatonic notes highlighted -->
  <!-- White keys -->
  <g stroke="#BBB" stroke-width="1" fill="white">
    <rect x="60"  y="55" width="74" height="120" rx="3"/>
    <rect x="138" y="55" width="74" height="120" rx="3"/>
    <rect x="216" y="55" width="74" height="120" rx="3"/>
    <rect x="294" y="55" width="74" height="120" rx="3"/>
    <rect x="372" y="55" width="74" height="120" rx="3"/>
    <rect x="450" y="55" width="74" height="120" rx="3"/>
    <rect x="528" y="55" width="74" height="120" rx="3"/>
    <rect x="606" y="55" width="74" height="120" rx="3"/>
    <rect x="684" y="55" width="74" height="120" rx="3"/>
  </g>
  <!-- Black keys -->
  <g fill="#333">
    <rect x="122" y="55" width="46" height="78" rx="3"/>
    <rect x="200" y="55" width="46" height="78" rx="3"/>
    <rect x="356" y="55" width="46" height="78" rx="3"/>
    <rect x="434" y="55" width="46" height="78" rx="3"/>
    <rect x="512" y="55" width="46" height="78" rx="3"/>
    <rect x="668" y="55" width="46" height="78" rx="3"/>
  </g>

  <!-- MAJOR PENTATONIC: C D E G A (no F, no B) — highlight in blue -->
  <!-- C -->
  <rect x="62"  y="57" width="70" height="116" rx="3" fill="#2196F3" opacity="0.7"/>
  <!-- D -->
  <rect x="140" y="57" width="70" height="116" rx="3" fill="#2196F3" opacity="0.7"/>
  <!-- E -->
  <rect x="218" y="57" width="70" height="116" rx="3" fill="#2196F3" opacity="0.7"/>
  <!-- G -->
  <rect x="374" y="57" width="70" height="116" rx="3" fill="#2196F3" opacity="0.7"/>
  <!-- A -->
  <rect x="452" y="57" width="70" height="116" rx="3" fill="#2196F3" opacity="0.7"/>

  <!-- Note labels -->
  <g font-size="14" font-weight="700" text-anchor="middle" fill="white">
    <text x="97"  y="148">Dó</text>
    <text x="175" y="148">Ré</text>
    <text x="253" y="148">Mi</text>
    <text x="331" y="148" fill="#666">Fá</text>
    <text x="409" y="148">Sol</text>
    <text x="487" y="148">Lá</text>
    <text x="565" y="148" fill="#666">Si</text>
    <text x="643" y="148" fill="#999">Dó</text>
  </g>

  <!-- X marks on skipped notes -->
  <text x="331" y="130" text-anchor="middle" font-size="22" fill="#CCC">✕</text>
  <text x="565" y="130" text-anchor="middle" font-size="22" fill="#CCC">✕</text>

  <!-- Label: Major pentatonic -->
  <rect x="60" y="190" width="340" height="32" rx="6" fill="#E3F2FD"/>
  <text x="230" y="202" text-anchor="middle" font-size="11" font-weight="700" fill="#1565C0">PENTATÔNICA MAIOR de Dó</text>
  <text x="230" y="216" text-anchor="middle" font-size="11" fill="#555">Dó – Ré – Mi – Sol – Lá  (5 notas, sem Fá e Si)</text>

  <!-- MINOR PENTATONIC: A C D E G -->
  <rect x="452" y="57" width="70" height="116" rx="3" fill="#E53935" opacity="0.7"/>
  <rect x="530" y="57" width="70" height="116" rx="3" fill="#E53935" opacity="0.4"/>

  <!-- Second keyboard row for minor pentatonic -->
  <rect x="420" y="190" width="340" height="32" rx="6" fill="#FFEBEE"/>
  <text x="590" y="202" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828">PENTATÔNICA MENOR de Lá</text>
  <text x="590" y="216" text-anchor="middle" font-size="11" fill="#555">Lá – Dó – Ré – Mi – Sol  (as mesmas teclas azuis!)</text>

  <!-- Arrow showing relation -->
  <text x="400" y="205" text-anchor="middle" font-size="18" fill="#999">⟷</text>

  <!-- Footer -->
  <text x="400" y="252" text-anchor="middle" font-size="11.5" fill="#555">A pentatônica maior de Dó e a pentatônica menor de Lá usam as MESMAS 5 notas — são relativas.</text>
  <text x="400" y="268" text-anchor="middle" font-size="11" fill="#888">No teclado: as 5 teclas pretas formam uma pentatônica — experimente só com elas!</text>
</svg>
