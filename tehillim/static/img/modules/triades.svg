<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="300" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">TRÍADES — OS 4 TIPOS DE ACORDES DE 3 NOTAS</text>

  <!-- 4 chord types: Major, Minor, Diminished, Augmented -->

  <!-- === MAIOR === -->
  <rect x="30" y="45" width="175" height="220" rx="10" fill="#E3F2FD"/>
  <text x="117" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#1565C0">MAIOR</text>
  <!-- Notes stacked -->
  <ellipse cx="117" cy="165" rx="22" ry="14" fill="#1565C0"/>
  <ellipse cx="117" cy="130" rx="22" ry="14" fill="#1565C0" opacity="0.7"/>
  <ellipse cx="117" cy="95" rx="22" ry="14" fill="#1565C0" opacity="0.4"/>
  <text x="117" y="170" text-anchor="middle" font-size="12" fill="white">Dó</text>
  <text x="117" y="135" text-anchor="middle" font-size="12" fill="white">Mi</text>
  <text x="117" y="100" text-anchor="middle" font-size="12" fill="white">Sol</text>
  <!-- Intervals -->
  <text x="152" y="152" font-size="10" fill="#555">3ª M</text>
  <text x="152" y="117" font-size="10" fill="#555">3ª m</text>
  <text x="117" y="210" text-anchor="middle" font-size="11" fill="#1565C0">Dó – Mi – Sol</text>
  <text x="117" y="228" text-anchor="middle" font-size="10" fill="#666">4 + 3 semitons</text>
  <text x="117" y="246" text-anchor="middle" font-size="10" fill="#666">som: alegre, estável</text>

  <!-- === MENOR === -->
  <rect x="215" y="45" width="175" height="220" rx="10" fill="#E8F5E9"/>
  <text x="302" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">MENOR</text>
  <ellipse cx="302" cy="165" rx="22" ry="14" fill="#2E7D32"/>
  <ellipse cx="302" cy="130" rx="22" ry="14" fill="#2E7D32" opacity="0.7"/>
  <ellipse cx="302" cy="95" rx="22" ry="14" fill="#2E7D32" opacity="0.4"/>
  <text x="302" y="170" text-anchor="middle" font-size="12" fill="white">Lá</text>
  <text x="302" y="135" text-anchor="middle" font-size="12" fill="white">Dó</text>
  <text x="302" y="100" text-anchor="middle" font-size="12" fill="white">Mi</text>
  <text x="337" y="152" font-size="10" fill="#555">3ª m</text>
  <text x="337" y="117" font-size="10" fill="#555">3ª M</text>
  <text x="302" y="210" text-anchor="middle" font-size="11" fill="#2E7D32">Lá – Dó – Mi</text>
  <text x="302" y="228" text-anchor="middle" font-size="10" fill="#666">3 + 4 semitons</text>
  <text x="302" y="246" text-anchor="middle" font-size="10" fill="#666">som: triste, introspectivo</text>

  <!-- === DIMINUTA === -->
  <rect x="400" y="45" width="175" height="220" rx="10" fill="#FFF3E0"/>
  <text x="487" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">DIMINUTA</text>
  <ellipse cx="487" cy="165" rx="22" ry="14" fill="#E65100"/>
  <ellipse cx="487" cy="130" rx="22" ry="14" fill="#E65100" opacity="0.7"/>
  <ellipse cx="487" cy="95" rx="22" ry="14" fill="#E65100" opacity="0.4"/>
  <text x="487" y="170" text-anchor="middle" font-size="12" fill="white">Si</text>
  <text x="487" y="135" text-anchor="middle" font-size="12" fill="white">Ré</text>
  <text x="487" y="100" text-anchor="middle" font-size="12" fill="white">Fá</text>
  <text x="522" y="152" font-size="10" fill="#555">3ª m</text>
  <text x="522" y="117" font-size="10" fill="#555">3ª m</text>
  <text x="487" y="210" text-anchor="middle" font-size="11" fill="#E65100">Si – Ré – Fá</text>
  <text x="487" y="228" text-anchor="middle" font-size="10" fill="#666">3 + 3 semitons</text>
  <text x="487" y="246" text-anchor="middle" font-size="10" fill="#666">som: tenso, instável</text>

  <!-- === AUMENTADA === -->
  <rect x="585" y="45" width="175" height="220" rx="10" fill="#FCE4EC"/>
  <text x="672" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#AD1457">AUMENTADA</text>
  <ellipse cx="672" cy="165" rx="22" ry="14" fill="#AD1457"/>
  <ellipse cx="672" cy="130" rx="22" ry="14" fill="#AD1457" opacity="0.7"/>
  <ellipse cx="672" cy="95" rx="22" ry="14" fill="#AD1457" opacity="0.4"/>
  <text x="672" y="170" text-anchor="middle" font-size="12" fill="white">Dó</text>
  <text x="672" y="135" text-anchor="middle" font-size="12" fill="white">Mi</text>
  <text x="672" y="100" text-anchor="middle" font-size="12" fill="white">Sol♯</text>
  <text x="707" y="152" font-size="10" fill="#555">3ª M</text>
  <text x="707" y="117" font-size="10" fill="#555">3ª M</text>
  <text x="672" y="210" text-anchor="middle" font-size="11" fill="#AD1457">Dó – Mi – Sol♯</text>
  <text x="672" y="228" text-anchor="middle" font-size="10" fill="#666">4 + 4 semitons</text>
  <text x="672" y="246" text-anchor="middle" font-size="10" fill="#666">som: misterioso, suspenso</text>

  <!-- Bottom note -->
  <text x="400" y="284" text-anchor="middle" font-size="11" fill="#888">A diferença entre os 4 tipos é apenas a distância em semitons entre as notas.</text>
</svg>
