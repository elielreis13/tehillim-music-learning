<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="300" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">FÓRMULA DE COMPASSO</text>

  <!-- Three time signatures side by side -->
  <!-- 2/4 -->
  <rect x="60" y="45" width="200" height="210" rx="10" fill="#E3F2FD"/>
  <text x="160" y="100" text-anchor="middle" font-size="72" font-weight="700" fill="#1565C0" font-family="serif">2</text>
  <line x1="90" y1="115" x2="230" y2="115" stroke="#1565C0" stroke-width="2"/>
  <text x="160" y="170" text-anchor="middle" font-size="72" font-weight="700" fill="#1565C0" font-family="serif">4</text>
  <text x="160" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Binário Simples</text>
  <text x="160" y="228" text-anchor="middle" font-size="11" fill="#555">2 tempos por compasso</text>
  <text x="160" y="243" text-anchor="middle" font-size="11" fill="#555">Semínima = 1 tempo</text>
  <!-- beat dots -->
  <circle cx="140" cy="257" r="8" fill="#1565C0"/>
  <circle cx="180" cy="257" r="8" fill="#1565C0" opacity="0.4"/>

  <!-- 3/4 -->
  <rect x="300" y="45" width="200" height="210" rx="10" fill="#E8F5E9"/>
  <text x="400" y="100" text-anchor="middle" font-size="72" font-weight="700" fill="#2E7D32" font-family="serif">3</text>
  <line x1="330" y1="115" x2="470" y2="115" stroke="#2E7D32" stroke-width="2"/>
  <text x="400" y="170" text-anchor="middle" font-size="72" font-weight="700" fill="#2E7D32" font-family="serif">4</text>
  <text x="400" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Ternário Simples</text>
  <text x="400" y="228" text-anchor="middle" font-size="11" fill="#555">3 tempos por compasso</text>
  <text x="400" y="243" text-anchor="middle" font-size="11" fill="#555">Semínima = 1 tempo</text>
  <!-- beat dots -->
  <circle cx="376" cy="257" r="8" fill="#2E7D32"/>
  <circle cx="400" cy="257" r="8" fill="#2E7D32" opacity="0.6"/>
  <circle cx="424" cy="257" r="8" fill="#2E7D32" opacity="0.3"/>

  <!-- 4/4 -->
  <rect x="540" y="45" width="200" height="210" rx="10" fill="#FFF3E0"/>
  <text x="640" y="100" text-anchor="middle" font-size="72" font-weight="700" fill="#E65100" font-family="serif">4</text>
  <line x1="570" y1="115" x2="710" y2="115" stroke="#E65100" stroke-width="2"/>
  <text x="640" y="170" text-anchor="middle" font-size="72" font-weight="700" fill="#E65100" font-family="serif">4</text>
  <text x="640" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Quaternário Simples</text>
  <text x="640" y="228" text-anchor="middle" font-size="11" fill="#555">4 tempos por compasso</text>
  <text x="640" y="243" text-anchor="middle" font-size="11" fill="#555">Semínima = 1 tempo</text>
  <!-- beat dots -->
  <circle cx="613" cy="257" r="8" fill="#E65100"/>
  <circle cx="630" cy="257" r="8" fill="#E65100" opacity="0.7"/>
  <circle cx="648" cy="257" r="8" fill="#E65100" opacity="0.5"/>
  <circle cx="666" cy="257" r="8" fill="#E65100" opacity="0.3"/>

  <!-- Legend boxes at bottom -->
  <rect x="120" y="275" width="560" height="20" rx="6" fill="#F5F5F5"/>
  <text x="250" y="288" text-anchor="middle" font-size="10.5" fill="#666">Numerador = quantos tempos</text>
  <text x="540" y="288" text-anchor="middle" font-size="10.5" fill="#666">Denominador = qual figura recebe 1 tempo</text>
  <line x1="400" y1="276" x2="400" y2="294" stroke="#DDD" stroke-width="1"/>
</svg>
