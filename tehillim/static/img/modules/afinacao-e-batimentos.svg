<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="240" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">AFINAÇÃO E BATIMENTOS — COMO O OUVIDO DETECTA ERROS</text>

  <!-- Wave 1: 440Hz (blue) -->
  <text x="60" y="58" font-size="11" fill="#1565C0" font-weight="600">440 Hz</text>
  <polyline points="100,75 120,55 140,75 160,95 180,75 200,55 220,75 240,95 260,75 280,55 300,75 320,95 340,75 360,55 380,75 400,95 420,75 440,55 460,75 480,95 500,75 520,55 540,75"
    fill="none" stroke="#1565C0" stroke-width="2.2"/>

  <!-- Wave 2: 442Hz (red) -->
  <text x="60" y="118" font-size="11" fill="#C62828" font-weight="600">442 Hz</text>
  <polyline points="100,135 123,115 146,135 169,155 192,135 215,115 238,135 261,155 284,135 307,115 330,135 353,155 376,135 399,115 422,135 445,155 468,135 491,115 514,135 537,155"
    fill="none" stroke="#C62828" stroke-width="2.2"/>

  <!-- Beating wave (resultant) - amplitude modulated -->
  <text x="60" y="178" font-size="11" fill="#2E7D32" font-weight="600">Batimento</text>
  <text x="60" y="191" font-size="10" fill="#2E7D32">(2/seg)</text>
  <!-- Two cycles of amplitude envelope -->
  <polyline points="100,185 115,170 130,160 145,165 160,185 175,205 190,215 205,210 220,195 235,185 250,180 265,170 280,165 295,170 310,185 325,205 340,215 355,210 370,195 385,185 400,182 415,174 430,165 445,172 460,185 475,202 490,212 505,207 520,193 535,185"
    fill="none" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Annotations -->
  <line x1="230" y1="60" x2="230" y2="220" stroke="#DDD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="238" y="210" font-size="10" fill="#999">batimento</text>

  <line x1="460" y1="60" x2="460" y2="220" stroke="#DDD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="468" y="210" font-size="10" fill="#999">batimento</text>

  <!-- Right panel: tuner + target -->
  <rect x="580" y="45" width="190" height="80" rx="8" fill="#E3F2FD"/>
  <text x="675" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">Afinador digital</text>
  <text x="675" y="85" text-anchor="middle" font-size="22" font-weight="700" fill="#1565C0">A4 = 440</text>
  <text x="675" y="108" text-anchor="middle" font-size="11" fill="#1565C0">← 0 batimentos →</text>

  <rect x="580" y="138" width="190" height="55" rx="8" fill="#E8F5E9"/>
  <text x="675" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">Regra de ouro:</text>
  <text x="675" y="173" text-anchor="middle" font-size="10" fill="#555">Afine no afinador,</text>
  <text x="675" y="186" text-anchor="middle" font-size="10" fill="#555">depois afine no grupo</text>
</svg>
