<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="280" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">CLAVE DE SOL × CLAVE DE FÁ — QUEM USA QUAL?</text>

  <!-- Divider -->
  <line x1="400" y1="45" x2="400" y2="260" stroke="#EEE" stroke-width="2"/>

  <!-- === LEFT: CLAVE DE SOL === -->
  <text x="200" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Clave de Sol  𝄞</text>

  <!-- 5 staff lines -->
  <g stroke="#555" stroke-width="1.8">
    <line x1="50" y1="90"  x2="370" y2="90"/>
    <line x1="50" y1="107" x2="370" y2="107"/>
    <line x1="50" y1="124" x2="370" y2="124"/>
    <line x1="50" y1="141" x2="370" y2="141"/>
    <line x1="50" y1="158" x2="370" y2="158"/>
  </g>

  <!-- Treble clef symbol -->
  <text x="58" y="163" font-size="85" fill="#1565C0" font-family="serif">𝄞</text>

  <!-- Note names for treble clef (lines from bottom: E G B D F, spaces: F A C E) -->
  <!-- Lines: E4, G4, B4, D5, F5 -->
  <text x="155" y="162" font-size="10" fill="#888">Mi</text>
  <text x="155" y="145" font-size="10" fill="#888">Sol</text>
  <text x="155" y="128" font-size="10" fill="#888">Si</text>
  <text x="155" y="111" font-size="10" fill="#888">Ré</text>
  <text x="155" y="94"  font-size="10" fill="#888">Fá</text>
  <!-- Spaces: F A C E -->
  <text x="170" y="153" font-size="10" fill="#BBB">Fá</text>
  <text x="170" y="136" font-size="10" fill="#BBB">Lá</text>
  <text x="170" y="119" font-size="10" fill="#BBB">Dó</text>
  <text x="170" y="102" font-size="10" fill="#BBB">Mi</text>

  <!-- G note highlighted -->
  <ellipse cx="260" cy="141" rx="10" ry="7" fill="#1565C0"/>
  <line x1="270" y1="141" x2="270" y2="90" stroke="#1565C0" stroke-width="2"/>
  <text x="295" y="138" font-size="11" fill="#1565C0" font-weight="600">Sol (G4)</text>
  <text x="295" y="152" font-size="10" fill="#888">linha 2</text>

  <!-- Instruments list -->
  <text x="200" y="185" text-anchor="middle" font-size="11" fill="#555">Violão · Teclado (MD) · Flauta</text>
  <text x="200" y="200" text-anchor="middle" font-size="11" fill="#555">Guitarra · Soprano · Tenor</text>

  <!-- === RIGHT: CLAVE DE FÁ === -->
  <text x="600" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">Clave de Fá  𝄢</text>

  <!-- 5 staff lines -->
  <g stroke="#555" stroke-width="1.8">
    <line x1="430" y1="90"  x2="750" y2="90"/>
    <line x1="430" y1="107" x2="750" y2="107"/>
    <line x1="430" y1="124" x2="750" y2="124"/>
    <line x1="430" y1="141" x2="750" y2="141"/>
    <line x1="430" y1="158" x2="750" y2="158"/>
  </g>

  <!-- Bass clef symbol -->
  <text x="440" y="145" font-size="65" fill="#C62828" font-family="serif">𝄢</text>

  <!-- Note names for bass clef (lines from bottom: G B D F A, spaces: A C E G) -->
  <text x="540" y="162" font-size="10" fill="#888">Sol</text>
  <text x="540" y="145" font-size="10" fill="#888">Si</text>
  <text x="540" y="128" font-size="10" fill="#888">Ré</text>
  <text x="540" y="111" font-size="10" fill="#888">Fá</text>
  <text x="540" y="94"  font-size="10" fill="#888">Lá</text>
  <!-- Spaces -->
  <text x="556" y="153" font-size="10" fill="#BBB">Lá</text>
  <text x="556" y="136" font-size="10" fill="#BBB">Dó</text>
  <text x="556" y="119" font-size="10" fill="#BBB">Mi</text>
  <text x="556" y="102" font-size="10" fill="#BBB">Sol</text>

  <!-- F note highlighted (4th line from bottom) -->
  <ellipse cx="650" cy="107" rx="10" ry="7" fill="#C62828"/>
  <line x1="660" y1="107" x2="660" y2="62" stroke="#C62828" stroke-width="2"/>
  <text x="675" y="103" font-size="11" fill="#C62828" font-weight="600">Fá (F3)</text>
  <text x="675" y="116" font-size="10" fill="#888">linha 4</text>

  <!-- Instruments list -->
  <text x="600" y="185" text-anchor="middle" font-size="11" fill="#555">Baixo · Contrabaixo · Violoncelo</text>
  <text x="600" y="200" text-anchor="middle" font-size="11" fill="#555">Teclado (ME) · Barítono · Baixo</text>

  <!-- Footer -->
  <text x="400" y="238" text-anchor="middle" font-size="12" fill="#555">O símbolo da clave diz em qual linha a nota que dá nome à clave está escrita.</text>
</svg>
