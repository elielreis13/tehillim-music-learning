<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="300" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">PENTAGRAMA E CLAVES</text>

  <!-- === LEFT SIDE: CLAVE DE SOL === -->
  <text x="200" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#2196F3">Clave de Sol (Treble Clef)</text>

  <!-- Staff lines (5 lines) -->
  <line x1="70"  y1="90"  x2="330" y2="90"  stroke="#555" stroke-width="1.8"/>
  <line x1="70"  y1="108" x2="330" y2="108" stroke="#555" stroke-width="1.8"/>
  <line x1="70"  y1="126" x2="330" y2="126" stroke="#555" stroke-width="1.8"/>
  <line x1="70"  y1="144" x2="330" y2="144" stroke="#555" stroke-width="1.8"/>
  <line x1="70"  y1="162" x2="330" y2="162" stroke="#555" stroke-width="1.8"/>

  <!-- Line numbers (right side) -->
  <text x="336" y="165" font-size="10" fill="#999">1</text>
  <text x="336" y="147" font-size="10" fill="#999">2</text>
  <text x="336" y="129" font-size="10" fill="#999">3</text>
  <text x="336" y="111" font-size="10" fill="#999">4</text>
  <text x="336" y="93"  font-size="10" fill="#999">5</text>

  <!-- Space labels -->
  <text x="52" y="103" font-size="9" fill="#aaa">E4</text>
  <text x="52" y="121" font-size="9" fill="#aaa">E3</text>
  <text x="52" y="139" font-size="9" fill="#aaa">E2</text>
  <text x="52" y="157" font-size="9" fill="#aaa">E1</text>

  <!-- Treble clef (simplified drawn with paths) -->
  <text x="80" y="168" font-size="90" fill="#2196F3" font-family="serif">𝄞</text>

  <!-- Note on Sol line (line 2 from bottom = 2nd line) — G4 -->
  <ellipse cx="260" cy="126" rx="10" ry="7" fill="#2196F3"/>
  <line x1="270" y1="126" x2="270" y2="72" stroke="#2196F3" stroke-width="2"/>
  <text x="260" y="185" text-anchor="middle" font-size="11" fill="#2196F3">Sol (G4)</text>
  <text x="260" y="199" text-anchor="middle" font-size="10" fill="#999">linha 2</text>

  <!-- === RIGHT SIDE: CLAVE DE FÁ === -->
  <text x="600" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#F57C00">Clave de Fá (Bass Clef)</text>

  <!-- Staff lines -->
  <line x1="470" y1="90"  x2="730" y2="90"  stroke="#555" stroke-width="1.8"/>
  <line x1="470" y1="108" x2="730" y2="108" stroke="#555" stroke-width="1.8"/>
  <line x1="470" y1="126" x2="730" y2="126" stroke="#555" stroke-width="1.8"/>
  <line x1="470" y1="144" x2="730" y2="144" stroke="#555" stroke-width="1.8"/>
  <line x1="470" y1="162" x2="730" y2="162" stroke="#555" stroke-width="1.8"/>

  <!-- Line numbers -->
  <text x="736" y="165" font-size="10" fill="#999">1</text>
  <text x="736" y="147" font-size="10" fill="#999">2</text>
  <text x="736" y="129" font-size="10" fill="#999">3</text>
  <text x="736" y="111" font-size="10" fill="#999">4</text>
  <text x="736" y="93"  font-size="10" fill="#999">5</text>

  <!-- Bass clef symbol -->
  <text x="478" y="148" font-size="68" fill="#F57C00" font-family="serif">𝄢</text>

  <!-- Note on Fá line (line 4 from bottom) — F3 -->
  <ellipse cx="660" cy="108" rx="10" ry="7" fill="#F57C00"/>
  <line x1="670" y1="108" x2="670" y2="54" stroke="#F57C00" stroke-width="2"/>
  <text x="660" y="185" text-anchor="middle" font-size="11" fill="#F57C00">Fá (F3)</text>
  <text x="660" y="199" text-anchor="middle" font-size="10" fill="#999">linha 4</text>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="215" stroke="#DDD" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom note -->
  <text x="400" y="245" text-anchor="middle" font-size="12" fill="#555">A clave "trava" um nome de nota a uma linha — e dá nome a todas as outras.</text>

  <!-- Usage labels -->
  <text x="200" y="225" text-anchor="middle" font-size="10.5" fill="#666">Violão, teclado (MD), flauta, soprano</text>
  <text x="600" y="225" text-anchor="middle" font-size="10.5" fill="#666">Baixo, teclado (ME), violoncelo, barítono</text>
</svg>
