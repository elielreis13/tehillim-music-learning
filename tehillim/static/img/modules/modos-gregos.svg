<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="300" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">OS 7 MODOS GREGOS — ESCALAS DA ESCALA</text>

  <!-- 7 modes as color-coded rows -->
  <!-- Mode: name, starting note, character, color -->

  <!-- Helper: each mode shows which degree of C major it starts on -->

  <!-- Headers -->
  <text x="80"  y="55" text-anchor="middle" font-size="11" fill="#888">Modo</text>
  <text x="180" y="55" text-anchor="middle" font-size="11" fill="#888">Início</text>
  <text x="300" y="55" text-anchor="middle" font-size="11" fill="#888">Grau</text>
  <text x="490" y="55" text-anchor="middle" font-size="11" fill="#888">Diferença da Escala Maior</text>
  <text x="700" y="55" text-anchor="middle" font-size="11" fill="#888">Caráter</text>

  <line x1="30" y1="60" x2="770" y2="60" stroke="#EEE" stroke-width="1"/>

  <!-- Mode rows -->
  <!-- I. Jônico -->
  <rect x="30" y="63" width="740" height="28" rx="4" fill="#E3F2FD"/>
  <text x="80"  y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Jônico</text>
  <text x="180" y="82" text-anchor="middle" font-size="12" fill="#555">Dó</text>
  <text x="300" y="82" text-anchor="middle" font-size="12" fill="#555">1º grau</text>
  <text x="490" y="82" text-anchor="middle" font-size="11" fill="#555">= Escala Maior (igual)</text>
  <text x="700" y="82" text-anchor="middle" font-size="11" fill="#1565C0">Alegre, estável</text>

  <!-- II. Dórico -->
  <rect x="30" y="95" width="740" height="28" rx="4" fill="#E8F5E9"/>
  <text x="80"  y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Dórico</text>
  <text x="180" y="114" text-anchor="middle" font-size="12" fill="#555">Ré</text>
  <text x="300" y="114" text-anchor="middle" font-size="12" fill="#555">2º grau</text>
  <text x="490" y="114" text-anchor="middle" font-size="11" fill="#555">Menor com ♭3 e ♭7 (6ª natural)</text>
  <text x="700" y="114" text-anchor="middle" font-size="11" fill="#2E7D32">Soul, funk, gospel</text>

  <!-- III. Frígio -->
  <rect x="30" y="127" width="740" height="28" rx="4" fill="#FCE4EC"/>
  <text x="80"  y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">Frígio</text>
  <text x="180" y="146" text-anchor="middle" font-size="12" fill="#555">Mi</text>
  <text x="300" y="146" text-anchor="middle" font-size="12" fill="#555">3º grau</text>
  <text x="490" y="146" text-anchor="middle" font-size="11" fill="#555">Menor com ♭2 ♭3 ♭6 ♭7</text>
  <text x="700" y="146" text-anchor="middle" font-size="11" fill="#C62828">Espanhol, dramático</text>

  <!-- IV. Lídio -->
  <rect x="30" y="159" width="740" height="28" rx="4" fill="#FFF8E1"/>
  <text x="80"  y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#F57F17">Lídio</text>
  <text x="180" y="178" text-anchor="middle" font-size="12" fill="#555">Fá</text>
  <text x="300" y="178" text-anchor="middle" font-size="12" fill="#555">4º grau</text>
  <text x="490" y="178" text-anchor="middle" font-size="11" fill="#555">Maior com ♯4 (tom elevado)</text>
  <text x="700" y="178" text-anchor="middle" font-size="11" fill="#F57F17">Sonhador, celestial</text>

  <!-- V. Mixolídio -->
  <rect x="30" y="191" width="740" height="28" rx="4" fill="#FFF3E0"/>
  <text x="80"  y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Mixolídio</text>
  <text x="180" y="210" text-anchor="middle" font-size="12" fill="#555">Sol</text>
  <text x="300" y="210" text-anchor="middle" font-size="12" fill="#555">5º grau</text>
  <text x="490" y="210" text-anchor="middle" font-size="11" fill="#555">Maior com ♭7 (7ª abaixada)</text>
  <text x="700" y="210" text-anchor="middle" font-size="11" fill="#E65100">Blues, rock, dominante</text>

  <!-- VI. Eólio -->
  <rect x="30" y="223" width="740" height="28" rx="4" fill="#EDE7F6"/>
  <text x="80"  y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#4527A0">Eólio</text>
  <text x="180" y="242" text-anchor="middle" font-size="12" fill="#555">Lá</text>
  <text x="300" y="242" text-anchor="middle" font-size="12" fill="#555">6º grau</text>
  <text x="490" y="242" text-anchor="middle" font-size="11" fill="#555">= Escala Menor Natural</text>
  <text x="700" y="242" text-anchor="middle" font-size="11" fill="#4527A0">Triste, introspectivo</text>

  <!-- VII. Lócrio -->
  <rect x="30" y="255" width="740" height="28" rx="4" fill="#EFEBE9"/>
  <text x="80"  y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#4E342E">Lócrio</text>
  <text x="180" y="274" text-anchor="middle" font-size="12" fill="#555">Si</text>
  <text x="300" y="274" text-anchor="middle" font-size="12" fill="#555">7º grau</text>
  <text x="490" y="274" text-anchor="middle" font-size="11" fill="#555">Menor com ♭2 ♭3 ♭5 ♭6 ♭7</text>
  <text x="700" y="274" text-anchor="middle" font-size="11" fill="#4E342E">Instável, raro</text>
</svg>
