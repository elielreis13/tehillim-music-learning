<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="260" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">LEGATO × STACCATO — ARTICULAÇÃO</text>

  <!-- LEFT: LEGATO -->
  <rect x="40" y="45" width="340" height="190" rx="10" fill="#E3F2FD"/>
  <text x="210" y="70" text-anchor="middle" font-size="16" font-weight="700" fill="#1565C0">LEGATO</text>
  <text x="210" y="88" text-anchor="middle" font-size="11" fill="#555">notas ligadas e fluidas, sem silêncio entre elas</text>

  <!-- 4 connected notes with slur -->
  <g>
    <!-- Staff lines (mini) -->
    <line x1="70" y1="120" x2="360" y2="120" stroke="#BBB" stroke-width="1"/>
    <line x1="70" y1="133" x2="360" y2="133" stroke="#BBB" stroke-width="1"/>
    <line x1="70" y1="146" x2="360" y2="146" stroke="#BBB" stroke-width="1"/>

    <!-- Notes -->
    <ellipse cx="100" cy="133" rx="11" ry="7" fill="#1565C0"/>
    <line x1="111" y1="133" x2="111" y2="105" stroke="#1565C0" stroke-width="1.8"/>
    <ellipse cx="155" cy="120" rx="11" ry="7" fill="#1565C0"/>
    <line x1="166" y1="120" x2="166" y2="92" stroke="#1565C0" stroke-width="1.8"/>
    <ellipse cx="210" cy="133" rx="11" ry="7" fill="#1565C0"/>
    <line x1="221" y1="133" x2="221" y2="105" stroke="#1565C0" stroke-width="1.8"/>
    <ellipse cx="265" cy="146" rx="11" ry="7" fill="#1565C0"/>
    <line x1="276" y1="146" x2="276" y2="118" stroke="#1565C0" stroke-width="1.8"/>
    <ellipse cx="320" cy="133" rx="11" ry="7" fill="#1565C0"/>
    <line x1="331" y1="133" x2="331" y2="105" stroke="#1565C0" stroke-width="1.8"/>

    <!-- Slur arc over notes -->
    <path d="M 92,162 Q 210,185 328,162" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  </g>

  <!-- Sound wave visualization: continuous -->
  <text x="210" y="180" text-anchor="middle" font-size="10" fill="#888">Som contínuo e fluido:</text>
  <path d="M 70,195 C 95,185 110,210 140,195 C 165,182 185,210 210,195 C 235,182 255,210 280,195 C 305,182 325,210 350,195" fill="none" stroke="#1565C0" stroke-width="2"/>

  <text x="210" y="225" text-anchor="middle" font-size="11" fill="#1565C0" font-style="italic">"cantar as notas"</text>

  <!-- RIGHT: STACCATO -->
  <rect x="420" y="45" width="340" height="190" rx="10" fill="#FFF3E0"/>
  <text x="590" y="70" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">STACCATO</text>
  <text x="590" y="88" text-anchor="middle" font-size="11" fill="#555">notas curtas e separadas com silêncio entre elas</text>

  <!-- 5 staccato notes with dots -->
  <g>
    <line x1="450" y1="120" x2="740" y2="120" stroke="#BBB" stroke-width="1"/>
    <line x1="450" y1="133" x2="740" y2="133" stroke="#BBB" stroke-width="1"/>
    <line x1="450" y1="146" x2="740" y2="146" stroke="#BBB" stroke-width="1"/>

    <ellipse cx="480" cy="133" rx="11" ry="7" fill="#E65100"/>
    <line x1="491" y1="133" x2="491" y2="105" stroke="#E65100" stroke-width="1.8"/>
    <circle cx="480" cy="165" r="3" fill="#E65100"/>

    <ellipse cx="535" cy="120" rx="11" ry="7" fill="#E65100"/>
    <line x1="546" y1="120" x2="546" y2="92" stroke="#E65100" stroke-width="1.8"/>
    <circle cx="535" cy="165" r="3" fill="#E65100"/>

    <ellipse cx="590" cy="133" rx="11" ry="7" fill="#E65100"/>
    <line x1="601" y1="133" x2="601" y2="105" stroke="#E65100" stroke-width="1.8"/>
    <circle cx="590" cy="165" r="3" fill="#E65100"/>

    <ellipse cx="645" cy="146" rx="11" ry="7" fill="#E65100"/>
    <line x1="656" y1="146" x2="656" y2="118" stroke="#E65100" stroke-width="1.8"/>
    <circle cx="645" cy="165" r="3" fill="#E65100"/>

    <ellipse cx="700" cy="133" rx="11" ry="7" fill="#E65100"/>
    <line x1="711" y1="133" x2="711" y2="105" stroke="#E65100" stroke-width="1.8"/>
    <circle cx="700" cy="165" r="3" fill="#E65100"/>

    <text x="590" y="180" text-anchor="middle" font-size="10" fill="#888">• = staccato</text>
  </g>

  <!-- Sound wave: choppy -->
  <path d="M 450,195 L 465,185 L 465,205 L 475,195" fill="none" stroke="#E65100" stroke-width="2"/>
  <path d="M 500,195 L 515,185 L 515,205 L 525,195" fill="none" stroke="#E65100" stroke-width="2"/>
  <path d="M 550,195 L 565,185 L 565,205 L 575,195" fill="none" stroke="#E65100" stroke-width="2"/>
  <path d="M 600,195 L 615,185 L 615,205 L 625,195" fill="none" stroke="#E65100" stroke-width="2"/>
  <path d="M 650,195 L 665,185 L 665,205 L 675,195" fill="none" stroke="#E65100" stroke-width="2"/>

  <text x="590" y="225" text-anchor="middle" font-size="11" fill="#E65100" font-style="italic">"picar as notas"</text>

  <!-- Footer -->
  <text x="400" y="253" text-anchor="middle" font-size="11" fill="#888">A articulação muda completamente o caráter da música — mesmo sem mudar as notas.</text>
</svg>
