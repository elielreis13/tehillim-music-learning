<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="260" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">SÍMBOLOS DE PAUSA — O SILÊNCIO TEM DURAÇÃO</text>

  <!-- 5 rest symbols with names and values -->
  <!-- Same positions as figuras musicais: 5 columns -->

  <!-- PAUSA DE SEMIBREVE (x=90) -->
  <rect x="50" y="50" width="130" height="170" rx="8" fill="#E3F2FD"/>
  <!-- Symbol: filled rectangle hanging from line -->
  <line x1="95" y1="90" x2="145" y2="90" stroke="#1565C0" stroke-width="2"/>
  <rect x="95" y="90" width="50" height="22" rx="2" fill="#1565C0"/>
  <text x="120" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Semibreve</text>
  <text x="120" y="158" text-anchor="middle" font-size="12" fill="#555">4 tempos</text>
  <text x="120" y="176" text-anchor="middle" font-size="20" fill="#1565C0">𝄻</text>
  <text x="120" y="208" text-anchor="middle" font-size="11" fill="#888">fica abaixo</text>
  <text x="120" y="222" text-anchor="middle" font-size="11" fill="#888">da linha</text>

  <!-- PAUSA DE MÍNIMA (x=250) -->
  <rect x="190" y="50" width="130" height="170" rx="8" fill="#E8F5E9"/>
  <line x1="235" y1="110" x2="285" y2="110" stroke="#2E7D32" stroke-width="2"/>
  <rect x="235" y="88" width="50" height="22" rx="2" fill="#2E7D32"/>
  <text x="260" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Mínima</text>
  <text x="260" y="158" text-anchor="middle" font-size="12" fill="#555">2 tempos</text>
  <text x="260" y="176" text-anchor="middle" font-size="20" fill="#2E7D32">𝄼</text>
  <text x="260" y="208" text-anchor="middle" font-size="11" fill="#888">fica acima</text>
  <text x="260" y="222" text-anchor="middle" font-size="11" fill="#888">da linha</text>

  <!-- PAUSA DE SEMÍNIMA (x=400) -->
  <rect x="330" y="50" width="130" height="170" rx="8" fill="#FFF8E1"/>
  <text x="395" y="115" text-anchor="middle" font-size="48" fill="#F57F17">𝄽</text>
  <text x="395" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#F57F17">Semínima</text>
  <text x="395" y="158" text-anchor="middle" font-size="12" fill="#555">1 tempo</text>
  <text x="395" y="208" text-anchor="middle" font-size="11" fill="#888">serpentina</text>
  <text x="395" y="222" text-anchor="middle" font-size="11" fill="#888">vertical</text>

  <!-- PAUSA DE COLCHEIA (x=540) -->
  <rect x="470" y="50" width="130" height="170" rx="8" fill="#FFF3E0"/>
  <text x="535" y="120" text-anchor="middle" font-size="48" fill="#E65100">𝄾</text>
  <text x="535" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Colcheia</text>
  <text x="535" y="158" text-anchor="middle" font-size="12" fill="#555">½ tempo</text>
  <text x="535" y="208" text-anchor="middle" font-size="11" fill="#888">gancho</text>
  <text x="535" y="222" text-anchor="middle" font-size="11" fill="#888">simples</text>

  <!-- PAUSA DE SEMICOLCHEIA (x=680) -->
  <rect x="610" y="50" width="140" height="170" rx="8" fill="#FCE4EC"/>
  <text x="680" y="120" text-anchor="middle" font-size="48" fill="#C2185B">𝄿</text>
  <text x="680" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#C2185B">Semicolcheia</text>
  <text x="680" y="158" text-anchor="middle" font-size="12" fill="#555">¼ tempo</text>
  <text x="680" y="208" text-anchor="middle" font-size="11" fill="#888">gancho</text>
  <text x="680" y="222" text-anchor="middle" font-size="11" fill="#888">duplo</text>

  <!-- Footer -->
  <text x="400" y="244" text-anchor="middle" font-size="11" fill="#888">Cada pausa equivale à figura musical de mesma duração — o silêncio conta igual à nota.</text>
</svg>
