<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="240" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">INVERSÃO DE INTERVALOS — REGRA DO 9</text>

  <!-- Left: original interval Do-Mi (major 3rd) -->
  <rect x="30" y="42" width="230" height="130" rx="10" fill="#E3F2FD"/>
  <text x="145" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">Dó – Mi (3ª Maior)</text>

  <g stroke="#CCC" stroke-width="1">
    <line x1="60"  y1="80"  x2="220" y2="80"/>
    <line x1="60"  y1="94"  x2="220" y2="94"/>
    <line x1="60"  y1="108" x2="220" y2="108"/>
    <line x1="60"  y1="122" x2="220" y2="122"/>
    <line x1="60"  y1="136" x2="220" y2="136"/>
  </g>
  <ellipse cx="120" cy="136" rx="12" ry="7" fill="#1565C0"/>
  <ellipse cx="180" cy="122" rx="12" ry="7" fill="#1565C0"/>
  <text x="120" y="154" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="700">Dó</text>
  <text x="180" y="154" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="700">Mi</text>
  <text x="145" y="170" text-anchor="middle" font-size="10" fill="#888">4 semitons — M</text>

  <!-- Arrow showing inversion -->
  <text x="390" y="75" text-anchor="middle" font-size="32" fill="#888">⇌</text>
  <rect x="338" y="82" width="104" height="40" rx="8" fill="#E8F5E9"/>
  <text x="390" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">3 + 6 = 9</text>
  <text x="390" y="113" text-anchor="middle" font-size="10" fill="#555">M → m</text>

  <!-- Right: inverted interval Mi-Do (minor 6th) -->
  <rect x="540" y="42" width="230" height="130" rx="10" fill="#E8F5E9"/>
  <text x="655" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">Mi – Dó (6ª menor)</text>

  <g stroke="#CCC" stroke-width="1">
    <line x1="570" y1="80"  x2="730" y2="80"/>
    <line x1="570" y1="94"  x2="730" y2="94"/>
    <line x1="570" y1="108" x2="730" y2="108"/>
    <line x1="570" y1="122" x2="730" y2="122"/>
    <line x1="570" y1="136" x2="730" y2="136"/>
  </g>
  <ellipse cx="620" cy="122" rx="12" ry="7" fill="#2E7D32"/>
  <ellipse cx="680" cy="80"  rx="12" ry="7" fill="#2E7D32"/>
  <text x="620" y="154" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="700">Mi</text>
  <text x="680" y="154" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="700">Dó</text>
  <text x="655" y="170" text-anchor="middle" font-size="10" fill="#888">8 semitons — m</text>

  <!-- Bottom: equivalence table -->
  <rect x="30" y="185" width="740" height="42" rx="8" fill="#F5F5F5"/>
  <text x="400" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Tabela de inversões (soma = 9)</text>
  <g font-size="10" fill="#555" text-anchor="middle">
    <text x="105" y="218">2ª ↔ 7ª</text>
    <text x="220" y="218">3ª ↔ 6ª</text>
    <text x="335" y="218">4ª ↔ 5ª</text>
    <text x="490" y="218">Maior ↔ menor</text>
    <text x="635" y="218">Aum ↔ Dim</text>
    <text x="745" y="218">Justa = Justa</text>
  </g>
</svg>
