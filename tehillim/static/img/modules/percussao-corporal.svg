<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="320" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">PERCUSSÃO CORPORAL — 4 SONS DO CORPO</text>

  <!-- Stick figure body -->
  <!-- Head -->
  <circle cx="400" cy="75" r="28" fill="none" stroke="#555" stroke-width="2.5"/>
  <!-- Body -->
  <line x1="400" y1="103" x2="400" y2="195" stroke="#555" stroke-width="2.5"/>
  <!-- Arms -->
  <line x1="400" y1="130" x2="310" y2="160" stroke="#555" stroke-width="2.5"/>
  <line x1="400" y1="130" x2="490" y2="160" stroke="#555" stroke-width="2.5"/>
  <!-- Legs -->
  <line x1="400" y1="195" x2="350" y2="260" stroke="#555" stroke-width="2.5"/>
  <line x1="400" y1="195" x2="450" y2="260" stroke="#555" stroke-width="2.5"/>

  <!-- === ESTALAR DE DEDOS (top, head level) ===  -->
  <circle cx="400" cy="50" r="20" fill="#9C27B0" opacity="0.15"/>
  <text x="400" y="46" text-anchor="middle" font-size="22">🤌</text>
  <rect x="215" y="28" width="140" height="34" rx="8" fill="#9C27B0" opacity="0.9"/>
  <text x="285" y="43" text-anchor="middle" font-size="11" font-weight="700" fill="white">ESTALAR DE DEDOS</text>
  <text x="285" y="56" text-anchor="middle" font-size="10" fill="white">seco · preciso</text>
  <line x1="355" y1="50" x2="390" y2="60" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- === PALMA (hands) === -->
  <circle cx="300" cy="158" r="18" fill="#2196F3" opacity="0.15"/>
  <text x="300" y="163" text-anchor="middle" font-size="22">👏</text>
  <rect x="90" y="138" width="140" height="34" rx="8" fill="#2196F3" opacity="0.9"/>
  <text x="160" y="153" text-anchor="middle" font-size="11" font-weight="700" fill="white">PALMA</text>
  <text x="160" y="166" text-anchor="middle" font-size="10" fill="white">agudo · cortante</text>
  <line x1="230" y1="155" x2="283" y2="155" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- === BATIDA NO PEITO (chest) === -->
  <circle cx="400" cy="148" r="18" fill="#F44336" opacity="0.15"/>
  <text x="400" y="153" text-anchor="middle" font-size="22">✊</text>
  <rect x="575" y="120" width="155" height="34" rx="8" fill="#F44336" opacity="0.9"/>
  <text x="652" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="white">BATIDA NO PEITO</text>
  <text x="652" y="148" text-anchor="middle" font-size="10" fill="white">médio · profundo</text>
  <line x1="575" y1="137" x2="420" y2="148" stroke="#F44336" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- === STOMPING (feet) === -->
  <circle cx="370" cy="255" r="18" fill="#4CAF50" opacity="0.15"/>
  <text x="370" y="260" text-anchor="middle" font-size="22">👣</text>
  <rect x="215" y="272" width="170" height="34" rx="8" fill="#4CAF50" opacity="0.9"/>
  <text x="300" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="white">STOMPING (PISADA)</text>
  <text x="300" y="300" text-anchor="middle" font-size="10" fill="white">grave · pesado</text>
  <line x1="310" y1="272" x2="368" y2="263" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Backbeat pattern hint -->
  <rect x="530" y="260" width="220" height="44" rx="8" fill="#FFF3E0"/>
  <text x="640" y="277" text-anchor="middle" font-size="10.5" font-weight="700" fill="#E65100">BACKBEAT GOSPEL:</text>
  <text x="640" y="291" text-anchor="middle" font-size="10" fill="#E65100">Stomping = tempos 1 e 3</text>
  <text x="640" y="303" text-anchor="middle" font-size="10" fill="#E65100">Palma = tempos 2 e 4</text>
</svg>
