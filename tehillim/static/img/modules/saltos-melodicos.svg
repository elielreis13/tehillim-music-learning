<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="240" fill="#FAFAFA" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">SALTOS MELÓDICOS — ÂNCORAS DE INTERVALO</text>

  <!-- Staff lines -->
  <g stroke="#CCC" stroke-width="1">
    <line x1="30" y1="75"  x2="780" y2="75"/>
    <line x1="30" y1="91"  x2="780" y2="91"/>
    <line x1="30" y1="107" x2="780" y2="107"/>
    <line x1="30" y1="123" x2="780" y2="123"/>
    <line x1="30" y1="139" x2="780" y2="139"/>
  </g>

  <!-- Intervals from Do: each pair Do + target note, with label -->
  <!-- y: Do=139, Re=131, Mi=123, Fa=115, Sol=107, La=99, Si=91, Do8=75 -->

  <!-- Terça (Do-Mi) -->
  <ellipse cx="80"  cy="139" rx="10" ry="7" fill="#1565C0"/>
  <ellipse cx="130" cy="123" rx="10" ry="7" fill="#4CAF50"/>
  <path d="M 92 132 Q 108 115 118 124" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="105" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#4CAF50">3ª maior</text>
  <text x="105" y="160" text-anchor="middle" font-size="9" fill="#888">Dó-Mi</text>

  <!-- Quarta (Do-Fa) -->
  <ellipse cx="195" cy="139" rx="10" ry="7" fill="#1565C0"/>
  <ellipse cx="250" cy="115" rx="10" ry="7" fill="#2196F3"/>
  <path d="M 207 131 Q 225 110 238 116" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="222" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#2196F3">4ª justa</text>
  <text x="222" y="160" text-anchor="middle" font-size="9" fill="#888">Dó-Fá</text>
  <text x="222" y="172" text-anchor="middle" font-size="9" fill="#2196F3" font-style="italic">Quão Grande és Tu</text>

  <!-- Quinta (Do-Sol) -->
  <ellipse cx="315" cy="139" rx="10" ry="7" fill="#1565C0"/>
  <ellipse cx="370" cy="107" rx="10" ry="7" fill="#FF9800"/>
  <path d="M 327 131 Q 345 108 358 108" fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="342" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#FF9800">5ª justa</text>
  <text x="342" y="160" text-anchor="middle" font-size="9" fill="#888">Dó-Sol</text>
  <text x="342" y="172" text-anchor="middle" font-size="9" fill="#FF9800" font-style="italic">Twinkle Twinkle</text>

  <!-- Sexta (Do-La) -->
  <ellipse cx="435" cy="139" rx="10" ry="7" fill="#1565C0"/>
  <ellipse cx="490" cy="99"  rx="10" ry="7" fill="#9C27B0"/>
  <path d="M 447 131 Q 465 103 478 100" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="462" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#9C27B0">6ª maior</text>
  <text x="462" y="160" text-anchor="middle" font-size="9" fill="#888">Dó-Lá</text>
  <text x="462" y="172" text-anchor="middle" font-size="9" fill="#9C27B0" font-style="italic">Meu Jesus</text>

  <!-- Oitava (Do-Do8) -->
  <ellipse cx="555" cy="139" rx="10" ry="7" fill="#1565C0"/>
  <ellipse cx="610" cy="75"  rx="10" ry="7" fill="#F44336"/>
  <path d="M 567 132 Q 585 95 598 76" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="582" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#F44336">8ª (oitava)</text>
  <text x="582" y="160" text-anchor="middle" font-size="9" fill="#888">Dó-Dó</text>
  <text x="582" y="172" text-anchor="middle" font-size="9" fill="#F44336" font-style="italic">Over the Rainbow</text>

  <!-- All start from Do label -->
  <text x="80"  y="155" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">Dó</text>
  <text x="195" y="155" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">Dó</text>
  <text x="315" y="155" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">Dó</text>
  <text x="435" y="155" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">Dó</text>
  <text x="555" y="155" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">Dó</text>

  <!-- Legend -->
  <rect x="660" y="75" width="120" height="90" rx="8" fill="#F5F5F5"/>
  <text x="720" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Âncoras</text>
  <text x="720" y="107" text-anchor="middle" font-size="10" fill="#2196F3">4ª = Quão Grande</text>
  <text x="720" y="121" text-anchor="middle" font-size="10" fill="#FF9800">5ª = Twinkle</text>
  <text x="720" y="135" text-anchor="middle" font-size="10" fill="#F44336">8ª = Rainbow</text>
  <text x="720" y="149" text-anchor="middle" font-size="10" fill="#555">Pense → cante</text>

  <text x="400" y="215" text-anchor="middle" font-size="11" fill="#888">Memorize a âncora auditiva de cada salto — ela "dispara" a nota antes de cantar</text>
</svg>
